version: "3.8"

# NOTE: This project shares the vLLM container with the VT project.
# If the VT vLLM container is already running, you do NOT need to start this one.
# Only start this if vLLM is not already running.

services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: mm_zettai_vllm
    restart: unless-stopped
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - /home/cache/huggingface:/root/.cache/huggingface
    ports:
      - "8010:8000"
    command: >
      --model Qwen/Qwen3-Omni-30B-A3B-Instruct
      --tensor-parallel-size 2
      --gpu-memory-utilization 0.90
      --max-model-len 4096
      --max-num-seqs 16
      --enable-prefix-caching
      --dtype auto
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - ai-monitor-net

networks:
  ai-monitor-net:
    external: true
